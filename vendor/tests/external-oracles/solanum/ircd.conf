/* Minimal Solanum config for the differential harness (DESIGN §7.7).
 * Just enough to boot and accept plain clients on 6667; not for
 * production. Kept close to Solanum's reference example. */

serverinfo {
	name = "solanum.diff.example";
	sid = "1SL";
	description = "e6irc differential reference";
	network_name = "DiffNet";
};

class "users" {
	ping_time = 2 minutes;
	number_per_ident = 200;
	number_per_ip = 200;
	number_per_ip_global = 400;
	cidr_ipv4_bitlen = 24;
	cidr_ipv6_bitlen = 64;
	number_per_cidr = 400;
	max_number = 1000;
	sendq = 400 kbytes;
};

listen {
	host = "0.0.0.0";
	port = 6667;
};

auth {
	user = "*@*";
	class = "users";
	flags = exceed_limit;
};

/* Test reference: exempt everyone from throttling and connection limits
 * so the harness can open several clients in quick succession. */
exempt {
	ip = "0.0.0.0/0";
};

channel {
	default_split_user_count = 0;
	default_split_server_count = 0;
	max_chans_per_user = 50;
	max_bans = 100;
};

general {
	default_floodcount = 0;
	throttle_count = 0;
	client_flood_max_lines = 0;
	disable_auth = yes;
	anti_nick_flood = no;
	anti_spam_exit_message_time = 0;
};
