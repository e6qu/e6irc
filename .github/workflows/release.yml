# Publish the e6irc container image to GHCR on pushes to main. The dev
# environment (github.com/e6qu/infra) pins the published multi-arch manifest.
#
# Tagging: each architecture is built natively on its own runner (no QEMU
# emulation, which makes a full Rust release build painfully slow) and pushed
# as `<short-sha>-amd64` / `<short-sha>-arm64`; a final job assembles the
# multi-arch manifest `<short-sha>` from them. No `latest` tag is published.
name: Release image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/e6qu/e6irc

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}-${{ matrix.arch }}

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - name: Assemble the multi-arch manifest
        env:
          SHA: ${{ steps.sha.outputs.short }}
        run: |
          docker buildx imagetools create -t "${IMAGE}:${SHA}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"
      - name: Report the published manifest digest
        env:
          SHA: ${{ steps.sha.outputs.short }}
        run: docker buildx imagetools inspect "${IMAGE}:${SHA}" --format '{{json .Manifest.Digest}}'
