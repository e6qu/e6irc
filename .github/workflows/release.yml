# Publish the e6irc container image to GHCR on pushes to main. The dev
# environment (github.com/e6qu/infra) pins the published multi-arch manifest.
#
# Tagging: each architecture is built natively on its own runner (no QEMU
# emulation, which makes a full Rust release build painfully slow) and pushed
# as `<short-sha>-amd64` / `<short-sha>-arm64`; a final job assembles the
# multi-arch manifest `<short-sha>` from them. No `latest` tag is published.
name: Release image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/e6qu/e6irc

jobs:
  metadata:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.revision.outputs.tag }}
    steps:
      - id: revision
        env:
          REVISION: ${{ github.sha }}
        run: |
          tag="${REVISION:0:12}"
          if [[ ! "$tag" =~ ^[0-9a-f]{12}$ ]]; then
            echo "invalid immutable image tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.metadata.outputs.tag }}-${{ matrix.arch }}
      - name: Verify the direct architecture image
        run: tools/verify-container-shape.sh "${IMAGE}:${{ needs.metadata.outputs.tag }}" "${{ matrix.arch }}"

  manifest:
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble the multi-arch manifest
        env:
          SHA: ${{ needs.metadata.outputs.tag }}
        run: |
          docker buildx imagetools create -t "${IMAGE}:${SHA}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"
      - name: Verify the multi-architecture manifest
        run: tools/verify-container-shape.sh "${IMAGE}:${{ needs.metadata.outputs.tag }}" manifest

  prune:
    needs: [metadata, manifest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Prune old images (keep newest 20 releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/prune-ghcr-versions.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" 20
