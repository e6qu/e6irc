<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>e6irc — sign in</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <main class="auth-shell" id="main-content">
      <section class="auth-card" aria-labelledby="sign-in-title">
      <span class="brand" aria-label="e6irc">e6irc</span>
      <p class="eyebrow">Single sign-on</p>
      <h1 id="sign-in-title">Sign in to e6irc</h1>
      <p class="lede">Connect to your networks and conversations.</p>
      <div class="actions">
      {% if providers.is_empty() %}
        <p class="none">No login providers are configured on this server.</p>
      {% else %}
        {% for p in providers %}
          <a class="primary-action" href="/api/v1/auth/oidc/{{ p }}/start">Continue with {{ p }}</a>
        {% endfor %}
      {% endif %}
      </div>
      </section>
    </main>
  </body>
</html>
